name: Deploy to cloudtype
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Connect deploy key
        uses: cloudtype-github-actions/connect@v1
        with:
          token: ${{ secrets.CLOUDTYPE_TOKEN }}
          ghtoken: ${{ secrets.GHP_TOKEN }}
      - name: Deploy
        uses: cloudtype-github-actions/deploy@v1
        with:
          token: ${{ secrets.CLOUDTYPE_TOKEN }}
          project: kl529/reverse1999-gacha-simulation
          stage: main
          yaml: >
            name: reverse1999-gacha-simulation

            app: next.js

            options:
              nodeversion: "20"
              env:
                - name: NEXT_PUBLIC_FIREBASE_API_KEY
                  value: NEXT_PUBLIC_FIREBASE_API_KEY
                - name: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
                  value: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
                - name: NEXT_PUBLIC_FIREBASE_PROJECT_ID
                  value: NEXT_PUBLIC_FIREBASE_PROJECT_ID
                - name: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
                  value: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
                - name: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
                  value: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
                - name: NEXT_PUBLIC_FIREBASE_APP_ID
                  value: NEXT_PUBLIC_FIREBASE_APP_ID
                - name: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
                  value: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
                - name: NEXT_PUBLIC_FIREBASE_VAPID_KEY
                  value: NEXT_PUBLIC_FIREBASE_VAPID_KEY
                - name: FIREBASE_PROJECT_ID
                  value: FIREBASE_PROJECT_ID
                - name: FIREBASE_CLIENT_EMAIL
                  value: FIREBASE_CLIENT_EMAIL
                - name: FIREBASE_PRIVATE_KEY
                  value: FIREBASE_PRIVATE_KEY
                - name: NODE_ENV
                  value: NODE_ENV
                - name: NEXT_PUBLIC_SITE_URL
                  value: NEXT_PUBLIC_SITE_URL
                - name: NEXT_PUBLIC_POSTHOG_KEY
                  value: NEXT_PUBLIC_POSTHOG_KEY
                - name: NEXT_PUBLIC_POSTHOG_HOST
                  value: NEXT_PUBLIC_POSTHOG_HOST
                - name: NEXT_PUBLIC_CDN_URL
                  value: NEXT_PUBLIC_CDN_URL
              buildenv: []
              buildtype: standalone
              install: npm ci
              build: npm run build
            context:
              git:
                url: git@github.com:${{ github.repository }}.git
                ref: ${{ github.ref }}
